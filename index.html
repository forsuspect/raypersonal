<body style="background-color: #fdfaf9; margin: 0;">
  <div id="root">
    <!-- Instant Loading State -->
    <div id="initial-loader" style="position: fixed; inset: 0; display: flex; align-items: center; justify-center; background-color: #fdfaf9; z-index: 9999; display: flex; flex-direction: column; justify-content: center;">
      <div style="text-align: center;">
        <img src="/img/ray-logo.png" alt="Loading..." style="height: 60px; width: auto; margin-bottom: 20px; animation: pulse 1.5s ease-in-out infinite;">
        <div style="width: 40px; height: 2px; background: #4A0E0E; margin: 0 auto; border-radius: 2px; animation: loading-width 1s ease-in-out infinite;"></div>
      </div>
    </div>
    <style>
      @keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes loading-width { 0% { width: 0; opacity: 0; } 50% { width: 40px; opacity: 1; } 100% { width: 0; opacity: 0; } }
    </style>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>
